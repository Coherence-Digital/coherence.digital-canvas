name: cta-banner
version: 1.0.0
category: content
display_name: CTA Banner
description: >
  Heading + subhead + button. Use as a section-end conversion prompt.
  Light or dark background.
react_component: CtaBanner
react_module: ../components/CtaBanner.jsx
slots:
  - { name: heading, type: string,  required: true }
  - { name: subhead, type: text,    required: false }
  - { name: cta,     type: link,    required: true }
  - { name: dark,    type: boolean, default: false }
  - { name: align,   type: enum, options: [left, center], default: center }
preview:
  thumbnail: cta-banner.png
  shape: full-bleed
